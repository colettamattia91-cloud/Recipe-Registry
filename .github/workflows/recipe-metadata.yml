name: Recipe Metadata

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run generator unit tests
        run: python -m unittest discover -s tools/recipe-metadata/tests

      - name: Check generated metadata is current
        run: python tools/recipe-metadata/generate_recipe_metadata.py generate --flavor tbc --offline --check

      - name: Validate metadata strictly
        run: python tools/recipe-metadata/generate_recipe_metadata.py validate --flavor tbc --strict
