# Mining taxonomy — single bucket.
#
# Mining is a gathering profession and its only "recipes" are Smelting
# spells. The user wants a shallow sidebar with everything under one
# category. Mote of Earth / Mote of Fire are NOT mining recipes — they're
# reagents that drop from elementals, so they correctly never appear here.
#
# Note: the loader does not strip end-of-line comments, so each spell's
# description sits on its own line above its binding.
categories:
  - key: metals, label: Metals, order: 10
  - key: misc, label: Miscellaneous, order: 999
subcategories:
spells:
