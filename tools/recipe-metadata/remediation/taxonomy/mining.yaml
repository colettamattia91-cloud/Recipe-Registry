# Mining taxonomy — two buckets only.
#
# Mining is a gathering profession; its only "recipes" are the Smelting
# spells. The user wants the sidebar to stay shallow here, so we keep just
# two categories:
#
# - metals: basic ore-to-bar smelts and pure metal-to-metal alloys
#   (Bronze, Steel, Eternium). What you smelt straight from the forge.
# - elementals: smelts that require a Primal/Elemental component
#   (Elementium needs Elemental Flux; Felsteel and Hardened Adamantite
#   need Primal Fire / Primal Earth). These usually involve a profession
#   trainer prerequisite or a quest unlock.
#
# Note: the loader does not strip end-of-line comments, so each spell's
# description sits on its own line above its binding.
categories:
  - key: metals, label: Metals, order: 10
  - key: elementals, label: Elemental Alloys, order: 20
  - key: misc, label: Miscellaneous, order: 999
subcategories:
spells:
