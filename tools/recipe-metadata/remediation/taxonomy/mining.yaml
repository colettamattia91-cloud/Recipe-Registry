# Mining taxonomy: classification by SMELTING tier (Vanilla → TBC).
# Mining is a gathering profession; its only recipes are Smelting spells
# that turn raw ore into bars. Categories follow the in-game Smelting
# window's progression (basic → low → mid → high → endgame TBC alloys).
#
# Note: the loader does not strip end-of-line comments, so each spell's
# description sits on its own line above its binding.
categories:
  - key: starter_bars, label: Starter Bars, order: 10
  - key: low_bars, label: Low-Tier Bars, order: 20
  - key: mid_bars, label: Mid-Tier Bars, order: 30
  - key: high_bars, label: High-Tier Bars, order: 40
  - key: tbc_bars, label: Outland Bars, order: 50
  - key: alloys, label: Alloys, order: 60
  - key: elite_bars, label: Elite Bars, order: 70
  - key: misc, label: Miscellaneous, order: 999
subcategories:
